apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-copilot-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: financial-copilot.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: financial-copilot-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: financial-copilot-frontend
                port:
                  number: 8501
