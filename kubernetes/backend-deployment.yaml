apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-copilot-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: financial-copilot-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: financial-copilot-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
