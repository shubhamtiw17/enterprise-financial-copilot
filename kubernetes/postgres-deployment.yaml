apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-copilot-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: copilot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: financial-copilot-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: copilot
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
