version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: financial_copilot_db
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: financial_copilot_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: